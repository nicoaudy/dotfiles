env:
  TERM: xterm-256color

window:
  opacity: 0.90
  padding:
    x: 5
    y: 5
  startup_mode: Windowed
  decorations: buttonless

live_config_reload: true
selection:
  save_to_clipboard: true
mouse:
  hide_when_typing: true

font:
  size: 12
  glyph_offset:
    y: 9
  offset:
    x: 0
    y: 10
  normal:
    family: "MesloLGL Nerd Font"
    style: Regular

cursor:
  unfocused_hollow: true
  style:
    blinking: Never

scrolling:
  history: 2000
  auto_scroll: true

#######################################
##      START OF COLOR SCHEMES       ##
#######################################
schemes:
  ### Doom One ###
  doom-one: &doom-one
    primary:
      background: "#282c34"
      foreground: "#bbc2cf"
    cursor:
      text: CellBackground
      cursor: "#528bff"
    selection:
      text: CellForeground
      background: "#3e4451"
    normal:
      black: "#1c1f24"
      red: "#ff6c6b"
      green: "#98be65"
      yellow: "#da8548"
      blue: "#51afef"
      magenta: "#c678dd"
      cyan: "#5699af"
      white: "#202328"
    bright:
      black: "#5b6268"
      red: "#da8548"
      green: "#4db5bd"
      yellow: "#ecbe7b"

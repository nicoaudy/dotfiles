#######################################
##       END OF COLOR SCHEMES        ##
#######################################

key_bindings:
  - { key: N, mods: Command|Shift, action: SpawnNewInstance }
  - { key: K, mods: Command, action: ClearHistory }
  - { key: Return, mods: Command, action: ToggleSimpleFullscreen }
  - { key: F, mods: Command|Control, action: ToggleFullScreen }
  - { key: Semicolon, mods: Control, chars: "\x1b[27;5;59~" } # for codeium
  - { key: Comma, mods: Control, chars: "\x1b[44;5u" } # for codeium
  - { key: X, mods: Control, chars: "\x1b[120;5u" } # for codeium
